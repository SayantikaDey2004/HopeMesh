# Render Blueprint for HopeMesh FastAPI backend
services:
  - type: web
    name: HopeMesh-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: FRONTEND_URL
        value: <your-frontend-url>
      - key: DB_URL
        value: <your-db-url>
      # Add all required env vars from env.txt
